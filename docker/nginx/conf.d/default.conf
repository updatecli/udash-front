server {
    listen 80 default_server;

    server_name _;
    root /usr/share/nginx/html;

    index index.html;

    # Serve static assets regardless of any subpath prefix.
    # Handles e.g. /udash/assets/index.css -> /assets/index.css
    location ~ /assets/(.+)$ {
        try_files /assets/$1 =404;
    }

    # Serve favicon regardless of any subpath prefix.
    # Handles e.g. /udash/favicon.ico -> /favicon.ico
    location ~ (^|.*/)favicon\.ico$ {
        try_files /favicon.ico =404;
    }

    # SPA fallback for all other routes (including subpath roots)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
